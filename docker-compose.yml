version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: property-ai-postgres
    environment:
      POSTGRES_DB: property_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: property-ai-backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/property_ai
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  voice-agent:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.voice-agent
    container_name: property-ai-voice-agent
    ports:
      - "4001:4001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/property_ai
    volumes:
      - voice_audio:/app/apps/voice-agent/public/audio
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: property-ai-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/property_ai
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        VITE_API_URL: ""
    container_name: property-ai-web
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  voice_audio:
