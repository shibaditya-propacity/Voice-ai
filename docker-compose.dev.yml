version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: property-ai-postgres-dev
    environment:
      POSTGRES_DB: property_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
